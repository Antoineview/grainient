<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>grainient — playground</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: #111; color: #eee; font-family: system-ui, sans-serif; }
      #app { display: grid; grid-template-rows: 1fr auto; height: 100vh; min-height: 100vh; }
      #stage { position: relative; overflow: hidden; min-height: 300px; }
      canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
      #controls {
        padding: 12px 16px;
        background: #1a1a1a;
        border-top: 1px solid #2a2a2a;
        display: flex;
        flex-wrap: wrap;
        gap: 16px 24px;
        align-items: center;
        font-size: 13px;
      }
      #controls label { display: flex; align-items: center; gap: 8px; }
      #controls input[type="range"] { width: 140px; }
      #colors { display: flex; gap: 6px; }
      #colors input[type="color"] { width: 32px; height: 28px; padding: 0; border: 1px solid #333; background: #111; }
      button { background: #2a2a2a; border: 1px solid #3a3a3a; color: #eee; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
      button:hover { background: #333; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="stage">
        <canvas id="canvas"></canvas>
      </div>
      <div id="controls">
        <div id="colors"></div>
        <button id="add-color">+ color</button>
        <button id="remove-color">− color</button>
        <label>speed <input id="speed" type="range" min="0" max="2" step="0.01" value="1" /><span id="speed-v">1</span></label>
        <label>grain <input id="grain" type="range" min="0" max="0.5" step="0.01" value="0.15" /><span id="grain-v">0.15</span></label>
        <label>scale <input id="scale" type="range" min="0.5" max="5" step="0.05" value="3" /><span id="scale-v">3</span></label>
        <label>mesh <input id="mesh" type="range" min="0" max="2.5" step="0.05" value="1" /><span id="mesh-v">1</span></label>
        <label>smooth <input id="smoothness" type="range" min="0.3" max="3" step="0.05" value="1" /><span id="smoothness-v">1</span></label>
        <label>seed <input id="seed" type="range" min="0" max="100" step="1" value="0" /><span id="seed-v">0</span></label>
        <button id="toggle">Pause</button>
      </div>
    </div>
    <script type="module" src="/playground/main.ts"></script>
  </body>
</html>
